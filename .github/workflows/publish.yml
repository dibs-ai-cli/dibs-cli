name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish @dibsai/cli to npm
    runs-on: ubuntu-latest
    environment: cli-production

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
